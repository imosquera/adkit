installed:
- archive
- autopilot
- git
- progress
- review
- stale-tasks-guard
settings:
  auto_execute_hooks: true
hooks:
  before_tasks:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    priority: 10
    prompt: Commit outstanding changes before task generation?
    description: Auto-commit before task generation
    condition: null
  - extension: progress
    command: speckit.progress.tasks
    enabled: true
    optional: false
    priority: 10
    prompt: Execute speckit.progress.tasks?
    description: Mark the tasks phase active on the dashboard card (fires even when
      /speckit-tasks is replaced by another preset).
    condition: null
  before_implement:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    priority: 10
    prompt: Commit outstanding changes before implementation?
    description: Auto-commit before implementation
    condition: null
  - extension: progress
    command: speckit.progress.implement
    enabled: true
    optional: false
    priority: 10
    prompt: Execute speckit.progress.implement?
    description: Mark the implement phase active on the dashboard card (fires even
      when /speckit-implement is replaced by another preset).
    condition: null
  - extension: stale-tasks-guard
    command: speckit.stale-tasks-guard.implement
    enabled: true
    optional: false
    priority: 10
    prompt: Execute speckit.stale-tasks-guard.implement?
    description: Detect a stale tasks.md (spec.md modified after tasks.md was generated)
      and halt /speckit-implement before the implementation loop starts, unless --force
      is present.
    condition: null
  after_implement:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    priority: 10
    prompt: Commit implementation changes?
    description: Auto-commit after implementation
    condition: null
  - extension: review
    command: speckit.review.run
    enabled: true
    optional: false
    priority: 10
    prompt: Run comprehensive review on implemented changes?
    description: 'Multi-agent code review after implementation (mandatory: surfaces
      constitution violations even when the upfront audit was skipped)'
    condition: null
  before_specify:
  - extension: git
    command: speckit.git.feature
    enabled: true
    optional: false
    priority: 10
    prompt: Execute speckit.git.feature?
    description: Create feature branch before specification
    condition: null
  before_clarify:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    priority: 10
    prompt: Commit outstanding changes before clarification?
    description: Auto-commit before spec clarification
    condition: null
  before_plan:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    priority: 10
    prompt: Commit outstanding changes before planning?
    description: Auto-commit before implementation planning
    condition: null
  before_checklist:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    priority: 10
    prompt: Commit outstanding changes before checklist?
    description: Auto-commit before checklist generation
    condition: null
  before_analyze:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    priority: 10
    prompt: Commit outstanding changes before analysis?
    description: Auto-commit before analysis
    condition: null
  before_taskstoissues:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    priority: 10
    prompt: Commit outstanding changes before issue sync?
    description: Auto-commit before tasks-to-issues conversion
    condition: null
  after_constitution:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    priority: 10
    prompt: Commit constitution changes?
    description: Auto-commit after constitution update
    condition: null
  after_specify:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    priority: 10
    prompt: Commit specification changes?
    description: Auto-commit after specification
    condition: null
  after_clarify:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    priority: 10
    prompt: Commit clarification changes?
    description: Auto-commit after spec clarification
    condition: null
  after_plan:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    priority: 10
    prompt: Commit plan changes?
    description: Auto-commit after implementation planning
    condition: null
  after_tasks:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    priority: 10
    prompt: Commit task changes?
    description: Auto-commit after task generation
    condition: null
  after_checklist:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    priority: 10
    prompt: Commit checklist changes?
    description: Auto-commit after checklist generation
    condition: null
  after_analyze:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    priority: 10
    prompt: Commit analysis results?
    description: Auto-commit after analysis
    condition: null
  after_taskstoissues:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    priority: 10
    prompt: Commit after syncing issues?
    description: Auto-commit after tasks-to-issues conversion
    condition: null
